<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink Compare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#00ff88',
                        purple: '#9d4edd',
                        dark: '#0a0a0f',
                        card: '#1a1a2e'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate'
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 30px #00ff88' },
                            '100%': { boxShadow: '0 0 20px #00ff88, 0 0 30px #00ff88, 0 0 40px #00ff88' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-text {
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
        }
        .neon-border {
            box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <h1 class="text-5xl font-bold text-center mb-2 neon-text">🍻 Drink Compare</h1>
        <p class="text-center text-gray-400 mb-8">Find the best value drinks</p>

        <!-- Add Drink Section -->
        <div class="glass rounded-xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4 text-neon">Add Drink</h2>
            
            <!-- Manual Entry -->
            <div class="mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="manual-name" placeholder="Name" class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-neon focus:outline-none transition">
                    <input type="number" id="manual-volume" placeholder="Volume (ml)" class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-neon focus:outline-none transition">
                    <input type="number" id="manual-alcohol" placeholder="Alcohol %" class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-neon focus:outline-none transition">
                    <input type="number" id="manual-price" placeholder="Price (€)" class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-neon focus:outline-none transition">
                </div>
                <button onclick="addManualDrink()" class="w-full md:w-auto bg-neon text-dark font-bold px-6 py-2 rounded-lg hover:opacity-90 transition neon-border">
                    + Add
                </button>
            </div>

            <div class="border-t border-gray-700 my-4"></div>

            <!-- Barcode Scan -->
            <div>
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <input type="text" id="barcode-code" placeholder="Enter barcode" class="flex-1 bg-card border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-neon focus:outline-none transition">
                    <button onclick="openScanner()" class="bg-purple text-white font-bold px-6 py-2 rounded-lg hover:opacity-90 transition w-full md:w-auto">
                        📷 Scan
                    </button>
                </div>
                <div id="barcode-success" class="hidden flex items-center gap-2 mb-2 p-2 rounded-lg bg-neon/10 border border-neon"></div>
                <div id="barcode-error" class="hidden flex items-center gap-2 mb-2 p-2 rounded-lg bg-red-500/10 border border-red-500"></div>
            </div>
        </div>

        <!-- Drinks List -->
        <div class="glass rounded-xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-neon">🍷 Drinks Comparison</h2>
                <button onclick="clearAllDrinks()" class="text-red-400 hover:text-red-300 text-sm">Clear All</button>
            </div>
            <div id="drinks-list" class="space-y-4">
                <!-- Drinks will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-6">
        <a href="https://github.com/Dr4x14913/drink_compare" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-neon transition text-sm">
            💻 GitHub
        </a>
    </footer>

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">
        <div id="scanner-content" class="bg-card rounded-lg p-4 max-w-lg w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-neon">Scan Barcode</h3>
                <button onclick="closeScanner()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="reader" class="rounded-lg overflow-hidden" style="min-height: 400px;"></div>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeScanner()" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/score.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
